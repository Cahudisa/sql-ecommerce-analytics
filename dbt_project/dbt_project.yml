# dbt project configuration
# Docs: https://docs.getdbt.com/reference/dbt_project.yml

name: "olist_analytics"
version: "1.0.0"
profile: "olist_analytics"   # must match the profile name in profiles.yml

model-paths: ["models"]
test-paths: ["tests"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  olist_analytics:
    staging:                 # Silver layer
      +materialized: view
      +schema: staging
    marts:                   # Gold layer
      +materialized: table
      +schema: marts
