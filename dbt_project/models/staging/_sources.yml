version: 2

# Declares the Bronze layer (raw schema loaded by ingestion/load_raw.py)
# so staging models can reference it with {{ source('raw', '<table>') }}.

sources:
  - name: raw
    database: ecommerce
    schema: raw
    tables:
      - name: customers
      - name: geolocation
      - name: order_items
      - name: order_payments
      - name: order_reviews
      - name: orders
      - name: products
      - name: sellers
      - name: product_category_translation
