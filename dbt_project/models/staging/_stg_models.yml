version: 2

models:
  - name: stg_orders
    description: "Cleaned orders — one row per order, typed timestamps."
    columns:
      - name: order_id
        description: "Unique order identifier."
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
      - name: order_status
        data_tests:
          - accepted_values:
              values:
                - created
                - approved
                - invoiced
                - processing
                - shipped
                - delivered
                - canceled
                - unavailable
