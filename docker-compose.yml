services:
  postgres:
    image: postgres:16
    container_name: olist_postgres
    environment:
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist_local_dev   # local dev only — never reuse real credentials
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olist -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
